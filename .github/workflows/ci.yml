name: OrangeHRM Automation CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      suite:
        description: 'Maven profile'
        default: 'regression'
        type: choice
        options: [ smoke, regression, parallel ]
      browser:
        description: 'Browser'
        default: 'chrome'
        type: choice
        options: [ chrome, firefox, edge ]
  schedule:
    - cron: '0 2 * * *'   # nightly regression at 02:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run tests
        run: |
          mvn -B clean test \
            -P ${{ github.event.inputs.suite || 'regression' }} \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Upload screenshots & logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics
          path: |
            target/screenshots
            target/logs
            target/cucumber-reports

  publish-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
