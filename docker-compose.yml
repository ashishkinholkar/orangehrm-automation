# Spins up a Selenium Grid (hub + chrome/firefox nodes) and runs the suite
# against it. Usage:  docker compose up --build --abort-on-container-exit
version: "3.8"

services:
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4442:4442"
      - "4443:4443"
      - "4444:4444"

  chrome:
    image: selenium/node-chrome:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
    deploy:
      replicas: 1

  firefox:
    image: selenium/node-firefox:4.21.0
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3

  tests:
    build: .
    depends_on:
      - chrome
      - firefox
    environment:
      - REMOTE=true
      - GRIDURL=http://selenium-hub:4444/wd/hub
    volumes:
      - ./target:/automation/target
    command: ["-P", "parallel", "-Dremote=true", "-Dgridurl=http://selenium-hub:4444/wd/hub", "-Dbrowser=chrome"]
